server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # VitePress cleanUrls: /foo/bar → /foo/bar.html
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # llms-plugin markdown exports are named by clean URL (/foo.md), so a section
  # index has no /foo/index.md — resolve that guess to the /foo.md it emits.
  location ~ ^(.+)/index\.md$ {
    default_type text/plain;
    charset utf-8;
    try_files $uri $1.md =404;
  }

  # .md has no default mime mapping; serve as text/plain (like GitHub raw) so
  # browsers render the source inline instead of downloading it.
  location ~* \.md$ {
    default_type text/plain;
    charset utf-8;
  }

  # Aggressive cache for fingerprinted assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # HTML pages — short cache, always revalidate
  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
